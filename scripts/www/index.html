<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>激活码生成器 · 绿野护眼</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        /* ---------- 全局重置与护眼绿色主题 ---------- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(145deg, #c0ddb0 0%, #a0c89a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            margin: 0;
        }

        .card {
            background: rgba(245, 255, 240, 0.9);
            border-radius: 32px;
            box-shadow: 0 25px 45px rgba(40, 90, 40, 0.25);
            padding: 24px 20px;
            width: 100%;
            max-width: 500px;
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
            border: 1px solid rgba(160, 200, 140, 0.3);
        }

        h2, h3 {
            text-align: center;
            color: #1e4a2e;
            margin: 0 0 20px 0;
            font-weight: 600;
            letter-spacing: 0.5px;
            font-size: 1.6rem;
            text-shadow: 0 2px 4px rgba(200, 230, 180, 0.5);
        }

        h3 {
            font-size: 1.4rem;
            margin-bottom: 16px;
            color: #256635;
        }

        .input-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            color: #1e562e;
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #b8d9b0;
            border-radius: 24px;
            font-size: 1rem;
            transition: 0.2s;
            background: #ffffffec;
            -webkit-appearance: none;
            appearance: none;
            color: #1b3b1b;
        }

        input:focus {
            border-color: #4caf50;
            outline: none;
            box-shadow: 0 0 0 4px rgba(76, 175, 80, 0.2);
            background: #ffffff;
        }

        .hint {
            font-size: 0.8rem;
            color: #3d6b3d;
            margin-top: 8px;
            padding-left: 10px;
        }

        .quick-selectors {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 8px;
            justify-content: center;
        }

        .selector {
            flex: 1 0 auto;
            background: #dcf2d0;
            color: #1d4f1d;
            padding: 10px 12px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            border: 2px solid transparent;
            cursor: pointer;
            transition: 0.2s;
            min-width: 70px;
            text-align: center;
            touch-action: manipulation;
            box-shadow: 0 4px 8px rgba(90, 140, 70, 0.1);
        }

        /* 密钥按钮样式微调 */
        .key-selectors .selector {
            font-size: 0.85rem;
            white-space: normal;
            word-break: break-word;
            line-height: 1.3;
            padding: 10px 6px;
            flex: 1 1 0;
            min-width: 100px;
        }

        .selector:hover {
            background: #c0e0b0;
            transform: translateY(-2px);
            border-color: #a0c090;
        }

        .selector.active {
            background: #2a7a3a;
            color: white;
            border-color: #1f662f;
            box-shadow: 0 6px 12px rgba(40, 110, 40, 0.3);
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin: 24px 0 16px;
            flex-wrap: wrap;
        }

        @media (max-width: 480px) {
            .button-group {
                flex-direction: column;
                gap: 10px;
            }
            .quick-selectors {
                gap: 6px;
            }
            .selector {
                padding: 8px 6px;
                font-size: 0.8rem;
            }
            .key-selectors .selector {
                font-size: 0.75rem;
                min-width: 80px;
            }
        }

        button {
            flex: 1 1 auto;
            background: #2f9e44;
            border: none;
            color: white;
            padding: 16px 12px;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid transparent;
            min-width: 120px;
            touch-action: manipulation;
            box-shadow: 0 10px 15px -8px #2d6a2d;
        }

        button:hover {
            background: #1f7b2e;
            transform: translateY(-3px);
            box-shadow: 0 16px 24px -8px #1f5a1f;
        }

        button:active {
            transform: translateY(0);
            box-shadow: 0 6px 10px -4px #1f5a1f;
        }

        .result-area {
            background: #ecfbe8;
            border-radius: 28px;
            padding: 18px 14px;
            border: 2px dashed #7fb07f;
            text-align: center;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            color: #1a472a;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.4;
            box-shadow: inset 0 2px 6px #d0e8d0;
        }

        .error-message {
            color: #c44536;
            font-size: 0.9rem;
            text-align: center;
            margin-top: 10px;
            min-height: 24px;
            font-weight: 500;
        }

        .hidden {
            display: none;
        }

        .copy-toast {
            margin: 12px 0;
            padding: 10px 16px;
            border-radius: 40px;
            text-align: center;
            font-size: 0.95rem;
            font-weight: 500;
            background: #daf0d0;
            color: #1d4f1d;
            transition: background 0.2s, color 0.2s, box-shadow 0.2s;
            border: 1px solid #b0d0a0;
            box-shadow: 0 4px 8px rgba(130, 170, 100, 0.15);
        }

        .copy-toast.success {
            background: #409c4e;
            color: white;
            border-color: #2f7a3a;
        }

        .copy-toast.error {
            background: #d9534f;
            color: white;
            border-color: #b13b37;
        }

        #passwordSection input {
            background: #f4fff0;
        }

        #passwordSubmit {
            background: #3a9445;
        }

        #passwordSubmit:hover {
            background: #2a7a32;
        }

        @media (max-width: 360px) {
            .card {
                padding: 20px 16px;
            }
            h2 {
                font-size: 1.4rem;
            }
            button {
                padding: 14px 10px;
                font-size: 1rem;
            }
        }

        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            opacity: 0.6;
            height: 24px;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body>
    <div class="card">
        <div id="passwordSection">
            <h3>🔒 请输入访问密码</h3>
            <div class="input-group">
                <input type="password" id="passwordInput" placeholder="密码" autofocus>
            </div>
            <div class="button-group" style="margin-top:10px;">
                <button id="passwordSubmit">进入</button>
            </div>
            <div id="passwordError" class="error-message"></div>
        </div>

        <div id="generatorSection" class="hidden">
            <h2>🌿 激活码生成器</h2>

            <!-- 密钥版本选择：只显示“旧密钥”和“新密钥”，不暴露具体字符串 -->
            <div class="input-group">
                <label>🔑 密钥版本</label>
                <div class="key-selectors quick-selectors">
                    <button class="selector" data-key="Format2044153997">旧密钥</button>
                    <button class="selector" data-key="Franking.369?@66">新密钥</button>
                </div>
                <div class="hint">默认使用旧密钥</div>
            </div>

            <div class="input-group">
                <label>机器码 <span>(ID)</span></label>
                <input type="number" id="idInput" placeholder="例如 10086">
            </div>

            <div class="input-group">
                <label>📅 快捷有效期</label>
                <div class="quick-selectors" id="quickSelectors">
                    <button class="selector" data-days="1">测试1天</button>
                    <button class="selector" data-days="7">周卡7天</button>
                    <button class="selector" data-days="30">月卡30天</button>
                    <button class="selector" data-days="90">季卡90天</button>
                    <button class="selector" data-days="365">年卡365天</button>
                    <button class="selector" data-days="0">永久卡</button>
                </div>
            </div>

            <div class="input-group">
                <label>✏️ 自定义天数 </label>
                <input type="number" id="daysInput" placeholder="输入天数" min="0" value="1">
                <div class="hint">tip：0表示无期限</div>
            </div>

            <div class="button-group">
                <button id="generateBtn">✨ 生成激活码</button>
            </div>

            <!-- 动态区域：显示时间 或 复制反馈 (3秒切换) -->
            <div id="copyToast" class="copy-toast hidden"></div>

            <div class="result-area" id="resultDisplay">✨ 点击【生成激活码】</div>
        </div>
    </div>

    <script>
        (function() {
            // ---------- 加密固定参数 ----------
            const FIXED_KEY = 9411741;

            // ---------- DOM 元素 ----------
            const passwordSection = document.getElementById('passwordSection');
            const generatorSection = document.getElementById('generatorSection');
            const passwordInput = document.getElementById('passwordInput');
            const passwordSubmit = document.getElementById('passwordSubmit');
            const passwordError = document.getElementById('passwordError');
            const idInput = document.getElementById('idInput');
            const daysInput = document.getElementById('daysInput');
            const resultDisplay = document.getElementById('resultDisplay');
            const generateBtn = document.getElementById('generateBtn');
            const copyToast = document.getElementById('copyToast');

            // 天数快捷按钮 (限定在#quickSelectors)
            const selectorButtons = document.querySelectorAll('#quickSelectors .selector');
            // 密钥按钮
            const keyButtons = document.querySelectorAll('.key-selectors .selector');

            // 当前激活的密钥 (默认旧密钥 Format2044153997)
            let currentKeyString = 'Format2044153997';

            // 时间/提示模式
            let currentMode = 'time';
            let timeInterval = null;
            let restoreTimer = null;

            function formatNow() {
                const d = new Date();
                return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
            }

            function updateTimeDisplay() {
                if (currentMode === 'time') {
                    copyToast.textContent = `🕒 当前时间：${formatNow()}`;
                }
            }

            function stopAllTimers() {
                if (timeInterval) clearInterval(timeInterval);
                if (restoreTimer) clearTimeout(restoreTimer);
                timeInterval = null; restoreTimer = null;
            }

            function startClock() {
                stopAllTimers();
                updateTimeDisplay();
                timeInterval = setInterval(updateTimeDisplay, 1000);
            }

            function restoreTimeMode() {
                copyToast.classList.remove('success', 'error');
                currentMode = 'time';
                updateTimeDisplay();
                restoreTimer = null;
                if (!timeInterval) startClock();
            }

            function showTemporaryMessage(message, isError = false) {
                if (restoreTimer) clearTimeout(restoreTimer);
                currentMode = 'toast';
                copyToast.textContent = message;
                copyToast.classList.remove('success', 'error');
                copyToast.classList.add(isError ? 'error' : 'success');
                restoreTimer = setTimeout(restoreTimeMode, 3000);
            }

            // 密码验证 (进入后设置密钥默认高亮)
            const CORRECT_PASSWORD = "199612";
            passwordSubmit.addEventListener('click', function() {
                if (passwordInput.value === CORRECT_PASSWORD) {
                    passwordSection.classList.add('hidden');
                    generatorSection.classList.remove('hidden');
                    passwordError.textContent = '';

                    // 确保旧密钥按钮高亮
                    keyButtons.forEach(btn => {
                        if (btn.dataset.key === currentKeyString) btn.classList.add('active');
                        else btn.classList.remove('active');
                    });

                    copyToast.classList.remove('hidden');
                    currentMode = 'time';
                    copyToast.classList.remove('success', 'error');
                    startClock();
                    idInput.focus();
                    resultDisplay.textContent = '🌱 输入ID，点击生成';
                } else {
                    passwordError.textContent = '❌ 密码错误，请重新输入';
                    passwordInput.value = '';
                    passwordInput.focus();
                }
            });
            passwordInput.addEventListener('keypress', (e) => e.key === 'Enter' && passwordSubmit.click());

            // 生成激活码 (使用 currentKeyString)
            function generateActivationCode() {
                const idStr = idInput.value.trim();
                if (!idStr) return '';
                const idVal = parseInt(idStr, 10);
                if (isNaN(idVal)) return '';

                let daysVal = daysInput.value.trim() === '' ? 0 : parseInt(daysInput.value, 10);
                if (isNaN(daysVal) || daysVal < 0) daysVal = 0;

                const i3 = Math.floor(idVal / 2) + FIXED_KEY;
                const i3Hex = i3.toString(16);
                let plainText = i3Hex;
                if (daysVal > 0) {
                    plainText = i3Hex + 'z' + (daysVal * 86400000);
                }

                const key = CryptoJS.enc.Utf8.parse(currentKeyString);
                const encrypted = CryptoJS.AES.encrypt(plainText, key, {
                    mode: CryptoJS.mode.ECB,
                    padding: CryptoJS.pad.Pkcs7
                });
                return encrypted.ciphertext.toString(CryptoJS.enc.Hex);
            }

            // 复制
            function copyToClipboard(text) {
                return navigator.clipboard.writeText(text);
            }

            function updateResultAndCopy() {
                const code = generateActivationCode();
                if (code) {
                    resultDisplay.textContent = code;
                    copyToClipboard(code)
                        .then(() => showTemporaryMessage('✅ 激活码已复制', false))
                        .catch(() => showTemporaryMessage('❌ 复制失败，请手动复制', true));
                } else {
                    resultDisplay.textContent = '⚠️ 请输入有效ID后生成';
                }
            }
            generateBtn.addEventListener('click', updateResultAndCopy);
            idInput.addEventListener('keypress', (e) => e.key === 'Enter' && generateBtn.click());

            // 天数高亮管理
            function removeActiveClass() {
                selectorButtons.forEach(btn => btn.classList.remove('active'));
            }
            function setActiveByDay(dayValue) {
                removeActiveClass();
                if (dayValue === undefined) return;
                const num = parseInt(dayValue, 10);
                if (isNaN(num)) return;
                selectorButtons.forEach(btn => {
                    if (parseInt(btn.dataset.days, 10) === num) btn.classList.add('active');
                });
            }
            function syncActiveFromInput() {
                const raw = daysInput.value.trim();
                if (raw === '') setActiveByDay(0);
                else {
                    const num = parseInt(raw, 10);
                    if (!isNaN(num) && num >= 0) setActiveByDay(num);
                    else removeActiveClass();
                }
            }
            daysInput.addEventListener('input', syncActiveFromInput);
            selectorButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    daysInput.value = this.dataset.days;
                    syncActiveFromInput();
                });
            });
            daysInput.value = '1';
            setActiveByDay(1);

            // 密钥按钮切换 (实际密钥存储在 data-key 中，页面只显示“旧/新”)
            keyButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    keyButtons.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentKeyString = this.dataset.key;  // 仍使用隐藏的实际密钥
                });
            });
            // 初始高亮旧密钥
            keyButtons.forEach(btn => {
                if (btn.dataset.key === currentKeyString) btn.classList.add('active');
            });
        })();
    </script>
</body>
</html>
